# MiroShark — Backlog Ralph Loop
# Format compatible ralph-loop.sh (skill ralph-loop)
# Total: 35 user stories réparties sur 7 chantiers
# Stratégie: --target-branch main, séquentiel (dépendances multiples)
# Modèle recommandé: sonnet pour US simples, opus pour US complexes (007, 009, 020, 024)
#
# Quality gates (appliquées à chaque story par le runner) :
#   1. cd frontend && npm run build         → exit 0
#   2. cd backend && uv run pytest tests/ --tb=short -x  → exit 0
#   3. (UI stories) npx playwright test --reporter=list  → exit 0
#
# Signal de complétion (à émettre après la dernière story marquée passes=true) :
#   <promise>COMPLETE</promise>

project: miroshark
module: full
total_iterations: 35
target_branch: main
exit_signal: "<promise>COMPLETE</promise>"

# Politique de pause humaine (cf. CLAUDE.md global d'Amine)
# - Max 25 itérations sans intervention humaine
# - Circuit breaker: même erreur 3 fois → stopper + alerter
# - Recommandation: lancer en 2 batches
#     Batch 1 (US-000 → US-022, 23 itérations) — fondations + i18n + design + She Start + calibration
#     Batch 2 (US-023 → US-034, 12 itérations) — packaging + quick wins + hardening

user_stories:
  # ============================================================
  # Chantier 0 — Préparation (1 story, P0)
  # ============================================================
  - id: US-000
    title: "Sécuriser pytest pour quality gates Ralph"
    description: |
      Garantir que `cd backend && uv run pytest tests/` passe sans dépendance externe (Neo4j,
      LLM, Ollama). Si tests/test_integration_endpoints.py fait des appels réels, le marquer
      @pytest.mark.integration et ajouter une config pytest qui ignore integration par défaut.
    acceptance_criteria:
      - "cd backend && uv run pytest tests/ --tb=short -x retourne exit 0 sans Neo4j/LLM/Ollama"
      - "Au moins 1 smoke test unitaire qui vérifie create_app() ne crashe pas"
      - "pytest.ini ou pyproject.toml [tool.pytest.ini_options] markers déclare 'integration'"
      - "1 ligne dans backend/README.md ou tests/README.md sur comment lancer integration tests"
    files_scope:
      - "backend/tests/**"
      - "backend/pyproject.toml"
      - "backend/pytest.ini"
      - "backend/README.md"
    depends_on: []
    priority: 1
    allowed_tools: "Read,Write,Edit,Bash"

  # ============================================================
  # Chantier 1 — i18n FR + AR avec RTL (10 stories, P0/P1)
  # ============================================================
  - id: US-001
    title: "Setup vue-i18n + structure locales"
    description: |
      Installer vue-i18n@9 + @intlify/unplugin-vue-i18n. Créer src/i18n.js avec détection
      (URL ?lang= → localStorage → fr default). Créer src/locales/{fr,ar,en}.json. Brancher
      dans main.js. Plugin VueI18n dans vite.config.js.
    acceptance_criteria:
      - "vue-i18n@^9 et @intlify/unplugin-vue-i18n dans package.json"
      - "frontend/src/i18n.js exporte une instance i18n configurée"
      - "frontend/src/locales/{fr,ar,en}.json présents (peuvent être minimaux)"
      - "main.js utilise app.use(i18n)"
      - "vite.config.js a le plugin VueI18nPlugin"
      - "App.vue applique document.documentElement.dir = 'rtl' si locale === 'ar'"
      - "fr.json contient au moins {nav: {brand: 'MIROSHARK', explore: 'Explorer'}}"
    files_scope:
      - "frontend/package.json"
      - "frontend/src/i18n.js"
      - "frontend/src/locales/**"
      - "frontend/src/main.js"
      - "frontend/src/App.vue"
      - "frontend/vite.config.js"
    depends_on: ["US-000"]
    priority: 1
    allowed_tools: "Read,Write,Edit,Bash"

  - id: US-002
    title: "Externaliser textes Home + ScenarioSuggestions + TrendingTopics + TemplateGallery"
    description: |
      Remplacer toutes les chaînes EN hardcodées par $t() dans les 4 fichiers. Enrichir fr.json
      (et copier les keys vides dans ar.json + en.json).
    acceptance_criteria:
      - "Aucune chaîne d'UI hardcodée en EN dans les 4 fichiers"
      - "fr.json contient toutes les clés correspondantes (nav.*, home.*, scenarios.*, trending.*, templates.*)"
      - "ar.json + en.json ont les mêmes clés (placeholders OK)"
      - "?lang=en sur localhost montre les textes en EN dans ces 4 vues"
    files_scope:
      - "frontend/src/views/Home.vue"
      - "frontend/src/components/ScenarioSuggestions.vue"
      - "frontend/src/components/TrendingTopics.vue"
      - "frontend/src/components/TemplateGallery.vue"
      - "frontend/src/locales/**"
    depends_on: ["US-001"]
    priority: 1
    allowed_tools: "Read,Write,Edit,Bash"

