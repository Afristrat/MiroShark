services:
  neo4j:
    image: neo4j:5.15-community
    environment:
      - NEO4J_AUTH=neo4j/${NEO4J_PASSWORD:-miroshark}
      - NEO4J_server_config_strict__validation_enabled=false
    expose:
      - "7474"
      - "7687"
    volumes:
      - neo4j_data_v2:/data
    restart: unless-stopped

  ollama:
    image: ollama/ollama:latest
    expose:
      - "11434"
    volumes:
      - ollama_data:/root/.ollama
    restart: unless-stopped

  ollama-init:
    image: curlimages/curl:latest
    depends_on:
      - ollama
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        until curl -sf http://ollama:11434/ >/dev/null 2>&1; do
          echo "Waiting for ollama...";
          sleep 2;
        done;
        echo "Pulling nomic-embed-text...";
        curl -fsS -X POST http://ollama:11434/api/pull \
          -H "Content-Type: application/json" \
          -d '{"name":"nomic-embed-text","stream":false}';
        echo "Done.";
    restart: "no"

  miroshark:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      - FLASK_DEBUG=${FLASK_DEBUG:-false}
      - LLM_PROVIDER=${LLM_PROVIDER:-openai}
      - LLM_API_KEY=${LLM_API_KEY:-ollama}
      - LLM_BASE_URL=${LLM_BASE_URL:-http://ollama:11434/v1}
      - LLM_MODEL_NAME=${LLM_MODEL_NAME:-qwen2.5:32b}
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USER=neo4j
      - NEO4J_PASSWORD=${NEO4J_PASSWORD:-miroshark}
      - EMBEDDING_MODEL=${EMBEDDING_MODEL:-nomic-embed-text}
      - EMBEDDING_BASE_URL=${EMBEDDING_BASE_URL:-http://ollama:11434}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-${LLM_API_KEY:-ollama}}
      - OPENAI_API_BASE_URL=${OPENAI_API_BASE_URL:-${LLM_BASE_URL:-http://ollama:11434/v1}}
    expose:
      - "3000"
      - "5001"
    depends_on:
      - neo4j
      - ollama
    restart: unless-stopped
    volumes:
      - ./backend/uploads:/app/backend/uploads

volumes:
  neo4j_data_v2:
  ollama_data:
