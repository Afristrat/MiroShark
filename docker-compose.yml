services:
  neo4j:
    # 5.18+ is required for relationship vector indexes.  5.26 is the last
    # Neo4j 5 LTS and is a supported in-major upgrade from the previous 5.15.
    image: neo4j:5.26-community
    environment:
      - NEO4J_AUTH=neo4j/${NEO4J_PASSWORD:-miroshark}
      - NEO4J_server_config_strict__validation_enabled=false
      # Keep Neo4j predictable inside its Docker cgroup.  The page cache must
      # never infer the 62 GiB host capacity and starve neighboring stacks.
      - NEO4J_server_memory_heap_initial__size=512M
      - NEO4J_server_memory_heap_max__size=1G
      - NEO4J_server_memory_pagecache_size=1G
    expose:
      - "7474"
      - "7687"
    volumes:
      - neo4j_data_v2:/data
    mem_limit: 3g
    mem_reservation: 1500m
    cpus: 3
    pids_limit: 512
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    mem_limit: 256m
    mem_reservation: 128m
    cpus: 0.5
    pids_limit: 128
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  miroshark:
    # Build once: the web service and the RQ worker run the same application
    # image.  Two independent builds race while exporting identical layers on
    # Coolify/Buildx and can leave a deployment stuck indefinitely.
    image: miroshark-runtime:latest
    build:
      context: .
      dockerfile: Dockerfile
    environment: &miroshark_environment
      - FLASK_DEBUG=${FLASK_DEBUG:-false}
      - FLASK_ENV=${FLASK_ENV:-production}
      - SECRET_KEY=${SECRET_KEY:-}
      - CORS_ORIGINS=${CORS_ORIGINS:-}
      - LLM_PROVIDER=${LLM_PROVIDER:-openai}
      # The production gateway is configured through the environment.  Do not
      # silently fall back to a removed local Ollama service.
      - LLM_API_KEY=${LLM_API_KEY:-}
      - LLM_BASE_URL=${LLM_BASE_URL:-}
      - LLM_MODEL_NAME=${LLM_MODEL_NAME:-qwen2.5:32b}
      # Explicitly pass every model-routing slot to both the web process and
      # the RQ worker.  Coolify stores them as runtime variables, but Compose
      # only exposes variables declared in this service environment.
      - SMART_MODEL_NAME=${SMART_MODEL_NAME:-}
      - REPORT_MAX_PARALLEL_SECTIONS=${REPORT_MAX_PARALLEL_SECTIONS:-1}
      - INTAKE_LLM_MODEL=${INTAKE_LLM_MODEL:-}
      - WONDERWALL_MODEL_NAME=${WONDERWALL_MODEL_NAME:-}
      - MIROSHARK_LLM_CONCURRENCY=${MIROSHARK_LLM_CONCURRENCY:-2}
      - MIROSHARK_ROUND_TIMEOUT=${MIROSHARK_ROUND_TIMEOUT:-1800}
      - MIROSHARK_AGENT_MAX_TOKENS=${MIROSHARK_AGENT_MAX_TOKENS:-1200}
      - MIROSHARK_TWITTER_RECSYS=${MIROSHARK_TWITTER_RECSYS:-random}
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USER=neo4j
      - NEO4J_PASSWORD=${NEO4J_PASSWORD:-miroshark}
      - EMBEDDING_PROVIDER=${EMBEDDING_PROVIDER:-openai}
      - EMBEDDING_MODEL=${EMBEDDING_MODEL:-qwen3-emb-8b}
      - EMBEDDING_BASE_URL=${EMBEDDING_BASE_URL:-http://192.168.100.7:8005}
      - EMBEDDING_DIMENSIONS=${EMBEDDING_DIMENSIONS:-4096}
      # Qwen3-VL-Embedding-8B serves its native 4 096 dimensions and rejects
      # the OpenAI `dimensions` request parameter, even when it is identical.
      - EMBEDDING_REQUEST_DIMENSIONS=${EMBEDDING_REQUEST_DIMENSIONS:-false}
      - EMBEDDING_BATCH_SIZE=${EMBEDDING_BATCH_SIZE:-16}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-${LLM_API_KEY:-}}
      - OPENAI_API_BASE_URL=${OPENAI_API_BASE_URL:-${LLM_BASE_URL:-}}
      - REDIS_URL=redis://redis:6379/0
    expose:
      - "3000"
      - "5001"
    depends_on:
      neo4j:
        condition: service_started
      redis:
        condition: service_healthy
    restart: unless-stopped
    volumes:
      # US-203 : volume NOMMÉ (survit à la recréation du conteneur, y compris
      # sous Coolify) — l'ancien bind mount du build context était effacé à
      # chaque redeploy. Le payload des devis vit désormais dans Supabase ;
      # ce volume protège les artefacts de simulation (state, profils, PDF).
      - miroshark_uploads:/app/backend/uploads
    # The simulation runner is a subprocess of the web service.  Its local
    # cross-encoder and the Twitter Twhin recommendation model run in the
    # simulation subprocess.  Their peak exceeds 3 GiB before round one; keep
    # the reservation conservative while allowing the faithful arena model.
    mem_limit: 5g
    mem_reservation: 512m
    cpus: 2
    pids_limit: 256

  worker:
    # Reuse the image built by `miroshark` above; this is intentionally not a
    # second build of the same Dockerfile.
    image: miroshark-runtime:latest
    working_dir: /app/backend
    command: ["/bin/sh", "-c", "exec uv run --frozen rq worker --url \"$$REDIS_URL\" --with-scheduler --name \"simulation-worker-$${HOSTNAME}\" pdf-generation simulation-preparation report-generation"]
    environment: *miroshark_environment
    volumes:
      - miroshark_uploads:/app/backend/uploads
    mem_limit: 3g
    mem_reservation: 1g
    cpus: 4
    pids_limit: 256
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "uv run --frozen python -c 'import os; from redis import Redis; from rq import Worker; connection = Redis.from_url(os.environ[\"REDIS_URL\"]); expected = \"simulation-worker-\" + os.environ[\"HOSTNAME\"]; raise SystemExit(not (connection.ping() and any(worker.name == expected for worker in Worker.all(connection=connection))))'"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    stop_grace_period: 6m
    restart: unless-stopped

volumes:
  neo4j_data_v2:
  miroshark_uploads:
  redis_data:
