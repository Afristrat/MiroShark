<div class="absolute top-[10%] left-[20%] w-3 h-3 bg-tertiary-container rounded-sm rotate-45 opacity-60"></div>
<div class="absolute top-[15%] right-[25%] w-2 h-4 bg-primary-container rounded-full rotate-12 opacity-80"></div>

</div>

<div class="text-center mb-lg">
<h1 class="font-h1 text-h1 text-primary-container mb-sm">You're ready.</h1>
<p class="font-body-lg text-body-lg text-on-surface-variant max-w-lg mx-auto">Your configuration is complete. The system is fully primed for high-fidelity financial modeling.</p>
</div>
<!-- The Spotlight Element (Dashboard Mockup excerpt) -->
<div class="relative bg-surface-container-lowest border border-outline-variant/30 rounded-xl p-lg shadow-[0_20px_60px_-15px_rgba(161,63,15,0.05)] max-w-3xl w-full mb-xl">

<div class="absolute -top-12 -right-8 z-20">
<div class="relative bg-surface text-on-surface border border-outline-variant/50 rounded-lg p-md shadow-[0_10px_30px_-10px_rgba(161,63,15,0.1)] flex items-start gap-md max-w-[280px]">
<span class="material-symbols-outlined text-primary-container text-2xl fill-icon mt-1">rocket_launch</span>
<div>
<p class="font-body-md text-body-md font-medium">Lancez — votre première simulation démarre</p>
</div>

<div class="absolute -bottom-2 left-1/2 -translate-x-1/2 w-4 h-4 bg-surface border-r border-b border-outline-variant/50 rotate-45"></div>
</div>
</div>
<!-- Faux Dashboard Content to highlight the CTA -->
<div class="flex items-center justify-between border-b border-outline-variant/20 pb-md mb-lg">
<div>
<h2 class="font-h3 text-h3 text-on-background mb-xs">Simulation Engine</h2>
<p class="font-label-sm text-label-sm text-on-surface-variant uppercase tracking-wider">Ready State</p>
</div>
<!-- The Primary CTA being spotlighted -->
<div class="relative">
<!-- Pulsing Beacon -->
<span class="absolute -top-1 -right-1 flex h-4 w-4 z-10">
<span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-secondary-container opacity-75"></span>
<span class="relative inline-flex rounded-full h-4 w-4 bg-primary-container border-2 border-surface-container-lowest"></span>
</span>
<button class="bg-primary-container text-on-primary hover:bg-primary transition-colors duration-200 px-md py-sm rounded-DEFAULT font-label-sm text-label-sm uppercase tracking-wider flex items-center gap-sm">
                        Lancer une simulation
                        <span class="material-symbols-outlined text-sm">arrow_forward</span>
</button>
</div>
</div>
<!-- Faux Data Area to ground the UI -->
<div class="grid grid-cols-3 gap-md opacity-40 grayscale-[50%] select-none pointer-events-none">
<div class="h-24 bg-surface-container-low rounded-lg border border-outline-variant/20"></div>
<div class="h-24 bg-surface-container-low rounded-lg border border-outline-variant/20"></div>
<div class="h-24 bg-surface-container-low rounded-lg border border-outline-variant/20"></div>
</div>

<div class="bg-primary-container h-full w-full rounded-full"></div>
</div>
<span class="font-label-sm text-label-sm text-on-surface-variant font-medium">Étape 4/4</span>
</div>

<button class="bg-primary-container text-on-primary hover:bg-primary transition-colors duration-200 px-lg py-sm rounded-DEFAULT font-label-sm text-label-sm uppercase tracking-wider shadow-sm shadow-primary-container/20">
