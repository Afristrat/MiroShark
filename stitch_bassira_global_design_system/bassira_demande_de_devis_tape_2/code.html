        .material-symbols-outlined {
          font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;

<body class="bg-background min-h-screen flex flex-col antialiased">
<!-- Minimal Brand Anchor for Transactional Flow -->
<header class="w-full py-8 px-8 flex justify-center">
<a class="font-h3 text-h3 text-primary-container font-bold tracking-tighter" href="#">Bassira Causse</a>
</header>
<!-- Main Content Canvas -->
<main class="flex-grow flex items-center justify-center p-4 md:p-8">
<!-- Center Card -->
<div class="w-full max-w-2xl bg-surface-container-lowest border border-outline/20 rounded-xl p-md md:p-lg shadow-sm">
<!-- Stepper -->
<div class="flex items-center w-full mb-12">
<!-- Step 1 (Done) -->
<div class="flex flex-col items-center relative">
<div class="w-10 h-10 rounded-full bg-tertiary-container text-on-tertiary-container flex items-center justify-center border border-tertiary-container">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">check</span>
</div>
<span class="absolute -bottom-6 font-label-sm text-label-sm text-on-surface-variant whitespace-nowrap">Service</span>
</div>
<!-- Connector 1 -->
<div class="flex-1 h-px bg-tertiary-container mx-4"></div>
<!-- Step 2 (Active) -->
<div class="flex flex-col items-center relative">
<div class="w-10 h-10 rounded-full bg-primary-container text-on-primary border-2 border-primary-container flex items-center justify-center shadow-[0_0_15px_rgba(161,63,15,0.2)]">
<span class="font-label-sm text-[14px] font-bold">2</span>
</div>
<span class="absolute -bottom-6 font-label-sm text-label-sm text-primary-container font-bold whitespace-nowrap">Contact</span>
</div>
<!-- Connector 2 -->
<div class="flex-1 h-px bg-outline/20 mx-4"></div>
<!-- Step 3 (Pending) -->
<div class="flex flex-col items-center relative">
<div class="w-10 h-10 rounded-full bg-surface-variant text-on-surface-variant flex items-center justify-center border border-outline/20">
<span class="font-label-sm text-[14px] font-medium">3</span>
</div>
<span class="absolute -bottom-6 font-label-sm text-label-sm text-on-surface-variant whitespace-nowrap">Détails</span>
</div>
</div>
<!-- Header -->
<div class="mb-10 text-center">
<h1 class="font-h3 text-[24px] font-semibold text-on-background mb-2">Parlons de votre projet</h1>
<p class="font-body-md text-body-md text-on-surface-variant">Vos coordonnées nous permettront de préparer une approche sur-mesure.</p>
</div>
<!-- Form -->
<form action="#" class="space-y-6" method="POST">
<div class="grid grid-cols-1 md:grid-cols-2 gap-6">
<!-- Nom Complet -->
<div>
<label class="block font-body-md text-[14px] font-semibold text-on-background mb-2" for="fullName">Nom complet</label>
<input class="w-full h-12 px-4 rounded-DEFAULT border border-outline/30 bg-surface-container-lowest text-on-background font-body-md focus:outline-none focus:border-secondary-container focus:ring-2 focus:ring-secondary-container transition-all" id="fullName" name="fullName" placeholder="Ex: Amina Bennis" type="text"/>
</div>
<!-- Email pro -->
<div>
<label class="block font-body-md text-[14px] font-semibold text-on-background mb-2" for="email">Email professionnel</label>
<input class="w-full h-12 px-4 rounded-DEFAULT border border-outline/30 bg-surface-container-lowest text-on-background font-body-md focus:outline-none focus:border-secondary-container focus:ring-2 focus:ring-secondary-container transition-all" id="email" name="email" placeholder="amina@entreprise.com" type="email"/>
</div>
<!-- Organisation -->
<div>
<label class="block font-body-md text-[14px] font-semibold text-on-background mb-2" for="company">Organisation / Entreprise</label>
<input class="w-full h-12 px-4 rounded-DEFAULT border border-outline/30 bg-surface-container-lowest text-on-background font-body-md focus:outline-none focus:border-secondary-container focus:ring-2 focus:ring-secondary-container transition-all" id="company" name="company" placeholder="Nom de votre structure" type="text"/>
</div>
<!-- Role -->
<div>
<label class="block font-body-md text-[14px] font-semibold text-on-background mb-2" for="role">Rôle / Fonction</label>
<input class="w-full h-12 px-4 rounded-DEFAULT border border-outline/30 bg-surface-container-lowest text-on-background font-body-md focus:outline-none focus:border-secondary-container focus:ring-2 focus:ring-secondary-container transition-all" id="role" name="role" placeholder="Ex: Directeur Stratégie" type="text"/>
</div>
</div>
<!-- Timeline -->
<div class="pt-2">
<label class="block font-body-md text-[14px] font-semibold text-on-background mb-2" for="timeline">Échéance souhaitée</label>
<div class="relative">
<select class="w-full h-12 pl-4 pr-10 appearance-none rounded-DEFAULT border border-outline/30 bg-surface-container-lowest text-on-background font-body-md focus:outline-none focus:border-secondary-container focus:ring-2 focus:ring-secondary-container transition-all cursor-pointer" id="timeline" name="timeline">
<option disabled="" selected="" value="">Sélectionnez une estimation</option>
<option value="1">Moins de 1 mois (Urgent)</option>
<option value="3">De 1 à 3 mois</option>
<option value="6">Plus de 3 mois</option>
</select>
<div class="pointer-events-none absolute inset-y-0 right-0 flex items-center px-4 text-on-surface-variant">
<span class="material-symbols-outlined text-[20px]">expand_more</span>
</div>
</div>
</div>
<!-- Actions -->
<div class="flex items-center justify-between pt-8 mt-8 border-t border-outline/10">
<button class="group flex items-center gap-2 px-6 h-12 rounded-DEFAULT font-label-sm text-label-sm font-semibold uppercase tracking-wider text-on-surface-variant hover:text-on-background transition-colors" type="button">
<span class="material-symbols-outlined text-[18px] group-hover:-translate-x-1 transition-transform">arrow_back</span>
                        Retour
                    </button>
<button class="group flex items-center gap-2 px-8 h-12 rounded-DEFAULT bg-primary-container hover:bg-primary font-label-sm text-label-sm font-semibold uppercase tracking-wider text-on-primary transition-colors shadow-sm" type="submit">
                        Suivant
                        <span class="material-symbols-outlined text-[18px] group-hover:translate-x-1 transition-transform">arrow_forward</span>
</button>
</div>
</form>
</div>
</main>
</body></html>
