name: tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  unit:
    name: Backend unit tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      # Install only the thin dependencies the unit suite needs.
      # The full ``requirements.txt`` pulls in torch/transformers etc., which
      # are not required for the offline unit tests and slow CI cold-start.
      - name: Install unit-test dependencies
        run: |
          python -m pip install --upgrade pip
          pip install \
            "pytest>=8.0.0" \
            pyyaml \
            "openai>=1.0.0" \
            "flask>=3.0.0" \
            "flask-cors>=6.0.0" \
            "flask-compress>=1.17" \
            "python-dotenv>=1.0.0" \
            "pydantic>=2.0.0" \
            "requests>=2.31.0" \
            "neo4j>=5.15.0" \
            "pillow>=12.0.0"

      - name: Run unit tests
        run: pytest -m "not integration"

      - name: Ruff (lint)
        run: pip install ruff==0.15.2 && ruff check .

      - name: Mypy (typecheck)
        run: pip install mypy==2.3.0 && mypy app/

  frontend:
    name: Frontend build + lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: ESLint
        run: npx eslint .

# Smoke Playwright (frontend/tests/e2e) volontairement absent de cette CI :
# la suite cible bassira.ma EN PRODUCTION (read-only, cf.
# frontend/playwright.config.ts) — l'exécuter automatiquement sur chaque PR
# ferait taper du trafic non maîtrisé (branches non fiables) contre le site
# live. Reste un run manuel (`npm run test:e2e`) ou à planifier séparément
# (cron) si un environnement de staging dédié existe un jour (US-212).

